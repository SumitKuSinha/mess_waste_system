<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d67229;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d67229;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#d67229" stroke-width="2" opacity="0.3"/>
  
  <!-- Main Plate Circle -->
  <circle cx="100" cy="100" r="80" fill="#1A1A1A" stroke="#d67229" stroke-width="2.5"/>
  
  <!-- Leaf 1 - Top Right -->
  <path d="M 110 75 Q 130 70 135 85 Q 130 95 115 90 Q 105 87 110 75" fill="url(#orangeGrad)" stroke="#d67229" stroke-width="1"/>
  
  <!-- Leaf 2 - Left -->
  <path d="M 70 95 Q 55 90 52 105 Q 60 115 75 110 Q 80 105 70 95" fill="url(#orangeGrad)" stroke="#d67229" stroke-width="1"/>
  
  <!-- Leaf 3 - Bottom -->
  <path d="M 85 130 Q 80 145 95 150 Q 110 145 105 130 Q 100 128 85 130" fill="url(#orangeGrad)" stroke="#d67229" stroke-width="1"/>
  
  <!-- Fork Lines - Clean Design -->
  <line x1="100" y1="55" x2="100" y2="145" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.9"/>
  <line x1="85" y1="70" x2="85" y2="140" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="115" y1="70" x2="115" y2="140" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  
  <!-- Fork Handle Bottom -->
  <rect x="95" y="140" width="10" height="20" rx="5" fill="white" opacity="0.8"/>
  
  <!-- Decorative Ring -->
  <circle cx="100" cy="100" r="65" fill="none" stroke="#d67229" stroke-width="1" opacity="0.4"/>
</svg>
