worker_processes auto;
error_log logs/error.log warn;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log logs/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # ============================================
    # LAYER 1: Gateway Load Balancing
    # ============================================
    upstream gateway_backend {
        # Round-robin load balancing - distributes equally across servers
        # Gateway instances on non-conflicting ports: 5000, 5010, 5020
        server localhost:5000 max_fails=3 fail_timeout=10s;
        server localhost:5010 max_fails=3 fail_timeout=10s;
        server localhost:5020 max_fails=3 fail_timeout=10s;

        # Keep-alive connections to upstream servers
        keepalive 32;
    }

    server {
        listen 8080;
        server_name localhost;

        # Main location - proxy all requests to gateway load balancer
        location / {
            proxy_pass http://gateway_backend;
            proxy_http_version 1.1;

            # Headers to pass to upstream
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Timeouts
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffering
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
            proxy_busy_buffers_size 8k;
        }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "Load balancer is running\n";
            add_header Content-Type text/plain;
        }

        # Deny access to sensitive files
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}
